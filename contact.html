<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | TYBSc IT Hub</title>
    <meta name="description"
        content="Contact TYBSc IT Hub for feedback, suggestions, or questions about academic resources.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body class="light-theme">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TYBSc IT Hub</a>
            <button id="themeToggle" class="btn btn-light ms-auto">🌙</button>
        </div>
    </nav>

    <!-- Header -->
    <header class="text-center py-4 bg-light shadow-sm">
        <h2 class="fw-bold">Contact Us</h2>
        <p class="lead">Have feedback, suggestions, or questions? Reach out!</p>
        <a href="index.html" class="btn btn-outline-secondary mt-3">⬅ Back to Homepage</a>
    </header>

    <!-- Contact Form -->
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form action="mailto:aniket@example.com" method="post" enctype="text/plain">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" name="subject" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <button id="backToTop" class="btn btn-primary shadow d-flex">⬆</button>

    <footer class="bg-dark text-light text-center py-3 mt-5">
        <p class="mb-0">Disclaimer: This site provides links to external study resources.<br>
            Created by <strong>Aniket Singh</strong> © <span id="year"></span></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
